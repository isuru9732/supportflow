services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: supportflow-postgres
    environment:
      POSTGRES_DB: supportflow
      POSTGRES_USER: supportflow
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supportflow-redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    container_name: supportflow-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  # --- Backend services (uncomment as each is scaffolded — Epic 0 Task
